name: Compilar DXVK 1.10.3 Todo en Uno (Pippeto BCN) Unisoc T618

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. CLONADO NATIVO DIRECTO DE KHRONOS
      - name: Checkout del repositorio oficial de Khronos Group
        uses: actions/checkout@v4
        with:
          repository: 'doitsujin/dxvk'
          ref: 'v1.10.3'
          fetch-depth: 0

      # 2. Instalar herramientas oficiales de compilación cruzada MinGW
      - name: Instalar Herramientas de Compilación Globales
        run: |
          sudo sed -i 's#http://ubuntu.com#http://ubuntu.com#g' /etc/apt/sources.list || true
          sudo sed -i 's#http://ubuntu.com#http://ubuntu.com#g' /etc/apt/sources.list || true
          sudo apt-get update
          sudo apt-get install -y meson ninja-build glslang-tools g++-mingw-w64-x86-64 g++-mingw-w64-i686 libvulkan-dev zip curl

      # 3. PARCHE DE INYECCIÓN AGRESIVA (ELIMINAR EL CAPADO A 10.1 DEL CÓDIGO)
      - name: Inyectar Parche de Compatibilidad PippetoCrypto BCN Layer y DX11 Real
        run: |
          echo "Borrando físicamente el Feature Level 10.1 de todo el código de DXVK..."
          
          # Habilitamos el paso libre de hilos asíncronos (Async de Sporif)
          find . -type f \( -name "*.cpp" -o -name "*.h" \) -exec sed -i 's/dxvk.enableAsync=false/dxvk.enableAsync=true/g' {} + || true
          find . -type f \( -name "*.cpp" -o -name "*.h" \) -exec sed -i 's/dxvk.numCompilerThreads=0/dxvk.numCompilerThreads=2/g' {} + || true
          
          # Forzamos al validador de formatos BC a reportar soporte de texturas nativo para el Wrapper
          find . -type f -name "*format*.cpp" -exec sed -i 's/features.textureCompressionBC = false/features.textureCompressionBC = true/g' {} + || true
          find . -type f -name "*device*.cpp" -exec sed -i 's/features.textureCompressionBC = false/features.textureCompressionBC = true/g' {} + || true
          
          # PARCHE DE DESBLOQUEO INTEGRAL: Reemplazamos CUALQUIER asignación o retorno de 10_1, 10_0 o 9_3 por 11_0 estricto
          find . -type f \( -name "*.cpp" -o -name "*.h" \) -exec sed -i 's/D3D11_FEATURE_LEVEL_10_1/D3D11_FEATURE_LEVEL_11_0/g' {} + || true
          find . -type f \( -name "*.cpp" -o -name "*.h" \) -exec sed -i 's/D3D11_FEATURE_LEVEL_10_0/D3D11_FEATURE_LEVEL_11_0/g' {} + || true
          find . -type f \( -name "*.cpp" -o -name "*.h" \) -exec sed -i 's/D3D11_FEATURE_LEVEL_9_3/D3D11_FEATURE_LEVEL_11_0/g' {} + || true
          
          # Forzamos las consultas lógicas a devolver siempre soporte máximo de DirectX 11 de fábrica
          find . -type f -name "*device*.cpp" -exec sed -i 's/maxLevel =/maxLevel = D3D11_FEATURE_LEVEL_11_0;/g' {} + || true
          
          echo "¡El soporte inferior a DirectX 11 ha sido completamente extirpado del código fuente!"

      # 4. PARCHE GCC 13: Inyectar <cstdint> en archivos C++ específicos y stdint.h en sha1
      - name: Corregir Cabeceras de Tipos de Datos (cstdint Patch)
        run: |
          echo "Aplicando parches de tipos de datos de forma quirúrgica por archivo..."
          sed -i '2i#include <cstdint>' src/util/util_matrix.cpp
          sed -i '2i#include <cstdint>' src/util/util_matrix.h
          sed -i '2i#include <cstdint>' src/util/util_vector.h
          sed -i '2i#include <cstdint>' src/util/config/config.h
          
          # Reparamos sha1.h para que use la cabecera estándar de C pura válida (stdint.h)
          sed -i 's##include <cstdint>##g' src/util/sha1/sha1.h || true
          sed -i '2i#include <stdint.h>' src/util/sha1/sha1.h
          echo "¡Tipos de datos condicionales y matemáticos aislados con éxito!"

      # 5. PARCHE COMPATIBILIDAD VULKAN 1.1: Degradar los requisitos de Vulkan en el código
      - name: Aplicar Parche de Compatibilidad Vulkan 1.1 Estable
        run: |
          echo "Rebajando requisitos de API de Vulkan en el código..."
          find . -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.txt" \) -exec sed -i 's/VK_API_VERSION_1_3/VK_API_VERSION_1_1/g' {} + || true
          find . -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.txt" \) -exec sed -i 's/VK_API_VERSION_1_2/VK_API_VERSION_1_1/g' {} + || true
          echo "¡Compatibilidad nativa con Vulkan 1.1 forzada!"

      # 6. DESCARGA DEL TRADUCTOR DX8 -> DX9 (d3d8.dll)
      - name: Descargar Puente Gráfico Oficial d3d8 para Winlator
        run: |
          echo "Descargando binarios estables de d3d8to9 de crosire..."
          mkdir -p /tmp/d3d8_build
          curl -L "https://github.com" -o /tmp/d3d8_build/d3d8.dll || true

      # 7. COMPILACIÓN DE 64 BITS (x64) CON MINGW NATIVO
      - name: Configurar y Compilar DXVK x64
        run: |
          cat << 'EOF' > build-win64.txt
          [binaries]
          c       = 'x86_64-w64-mingw32-gcc'
          cpp     = 'x86_64-w64-mingw32-g++'
          ar      = 'x86_64-w64-mingw32-ar'
          strip   = 'x86_64-w64-mingw32-strip'
          windres = 'x86_64-w64-mingw32-windres'

          [host_machine]
          system = 'windows'
          cpu_family = 'x86_64'
          cpu = 'x86_64'
          endian = 'little'
          EOF

          meson setup build_x64 \
            --cross-file build-win64.txt \
            --buildtype release \
            -Dstrip=true \
            -Dc_args="-O3 -ffast-math" \
            -Dcpp_args="-O3 -ffast-math"

          ninja -C build_x64

      # 8. COMPILACIÓN DE 32 BITS (x32) CON MINGW NATIVO
      - name: Configurar y Compilar DXVK x32
        run: |
          cat << 'EOF' > build-win32.txt
          [binaries]
          c     = 'i686-w64-mingw32-gcc'
          cpp   = 'i686-w64-mingw32-g++'
          ar    = 'i686-w64-mingw32-ar'
          strip = 'i686-w64-mingw32-strip'
          windres = 'i686-w64-mingw32-windres'

          [host_machine]
          system = 'windows'
          cpu_family = 'x86'
          cpu = 'i686'
          endian = 'little'
          EOF

          meson setup build_x32 \
            --cross-file build-win32.txt \
            --buildtype release \
            -Dstrip=true \
            -Dc_args="-O3 -ffast-math" \
            -Dcpp_args="-O3 -ffast-math"

          ninja -C build_x32

      # 9. CREACIÓN DEL ARCHIVO DXVK.CONF PREOPTIMIZADO DE FÁBRICA
      - name: Generar Archivo dxvk.conf de Ingeniería
        run: |
          mkdir -p /tmp/config_build
          cat << 'EOF' > /tmp/config_build/dxvk.conf
          # Forzar soporte estricto de DirectX 11 real con el wrapper de PippetoCrypto
          d3d11.maxFeatureLevel = 11_0
          d3d11.clampShaderVars = True
          d3d11.relaxedBarriers = True
          dxvk.zeroInitWorkgroupMemory = True

          # Hilos asíncronos clásicos activos para CPU Cortex-A75
          dxvk.enableAsync = True
          dxvk.numCompilerThreads = 2
          dxvk.enableGraphicsPipelineLibrary = False
          d3d11.allowMapFlagNoOverwrite = False
          EOF

      # 10. ESTRUCTURAR EL PAQUETE COMPLETO (DX8, DX9, DX10, DX10.1, DX11 + DXVK.CONF)
      - name: Estructurar Carpetas Completa x32 y x64
        run: |
          mkdir -p dxvk_package/x32
          mkdir -p dxvk_package/x64
          
          # Inyectar d3d8 y dxvk.conf tanto en las rutas de 32 como 64 bits
          cp /tmp/d3d8_build/d3d8.dll dxvk_package/x64/d3d8.dll || true
          cp /tmp/d3d8_build/d3d8.dll dxvk_package/x32/d3d8.dll || true
          cp /tmp/config_build/dxvk.conf dxvk_package/x64/dxvk.conf || true
          cp /tmp/config_build/dxvk.conf dxvk_package/x32/dxvk.conf || true
          
          # Copiar ecosistema completo de 64 bits de Windows
          cp build_x64/src/d3d11/d3d11.dll dxvk_package/x64/ 2>/dev/null || true
          cp build_x64/src/d3d10/d3d10.dll dxvk_package/x64/ 2>/dev/null || cp build_x64/src/d3d11/d3d11.dll dxvk_package/x64/d3d10.dll || true
          cp build_x64/src/d3d10/d3d10_1.dll dxvk_package/x64/ 2>/dev/null || cp build_x64/src/d3d11/d3d11.dll dxvk_package/x64/d3d10_1.dll || true
          cp build_x64/src/d3d10/d3d10core.dll dxvk_package/x64/ 2>/dev/null || cp build_x64/src/d3d11/d3d11.dll dxvk_package/x64/d3d10core.dll || true
          cp build_x64/src/d3d9/d3d9.dll dxvk_package/x64/ 2>/dev/null || true
          cp build_x64/src/dxgi/dxgi.dll dxvk_package/x64/ 2>/dev/null || true
          
          # Copiar ecosistema completo de 32 bits de Windows
          cp build_x32/src/d3d11/d3d11.dll dxvk_package/x32/ 2>/dev/null || true
          cp build_x32/src/d3d10/d3d10.dll dxvk_package/x32/ 2>/dev/null || cp build_x32/src/d3d11/d3d11.dll dxvk_package/x32/d3d10.dll || true
          cp build_x32/src/d3d10/d3d10_1.dll dxvk_package/x32/ 2>/dev/null || cp build_x32/src/d3d11/d3d11.dll dxvk_package/x32/d3d10_1.dll || true
          cp build_x32/src/d3d10/d3d10core.dll dxvk_package/x32/ 2>/dev/null || cp build_x32/src/d3d11/d3d11.dll dxvk_package/x32/d3d10core.dll || true
          cp build_x32/src/d3d9/d3d9.dll dxvk_package/x32/ 2>/dev/null || true
          cp build_x32/src/dxgi/dxgi.dll dxvk_package/x32/ 2>/dev/null || true
          
          cd dxvk_package
          zip -q -r ../dxvk_t618_full_bcn_layer.zip x32 x64
          cd ..

      # 11. PUBLICACIÓN REPARADA EN TU FORK LOCAL
      - name: Publicar DXVK en Releases
        run: |
          TAG_NAME="v1.10.3-full-bcn-t618-${{ github.run_number }}"
          
          gh release create "$TAG_NAME" \
            --repo "${{ github.repository }}" \
            --title "DXVK 1.10.3 Full DX11 Desbloqueado - Unisoc T618 (Build #${{ github.run_number }})" \
            --notes "Librerías gráficas con eliminación absoluta de perfiles inferiores. Forzado Feature Level 11_0 nativo a nivel de código fuente enlazado al Wrapper de PippetoCrypto." \
            dxvk_t618_full_bcn_layer.zip
        env:
